name: PRAG Publication Validation

on:
  pull_request:
    branches:
      - main
  pull_request_review:
    types: [submitted]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: 🔒 PRAG Validation Gate
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 📂 Checkout Workspace Validation
        uses: actions/checkout@v4
        with:
          repository: BGA360/bridgenta-workspace
          path: bridgenta-workspace
          ref: main

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 🔍 Execute PRAG Validation
        run: node bridgenta-workspace/validation/ci_wrapper.js

      - name: 📤 Upload Validation Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prag-validation-reports
          path: |
            **/validation/validation-report.md
            **/validation/validation-report.json
          if-no-files-found: ignore
